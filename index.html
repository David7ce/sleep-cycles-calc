<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Find the best time to sleep or wake using 90-minute sleep cycles" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#eef0f8" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131730" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="favicon.ico" />

  <!-- iOS Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sleep Cycles" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <!-- Android Chrome Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Sleep Cycles</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <header>
      <h1>Sleep Cycles</h1>
      <button id="settingsBtn" class="icon-btn" type="button" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
        </svg>
      </button>
    </header>

    <div class="mode" role="group" aria-label="Calculation mode">
      <button id="modeWake" type="button" data-mode="wake" aria-pressed="true">Wake up at</button>
      <button id="modeBed" type="button" data-mode="bed" aria-pressed="false">Bed at</button>
      <button id="modeNow" type="button" data-mode="now" aria-pressed="false">Sleep now</button>
    </div>

    <div class="time-row">
      <input id="time" type="time" aria-label="Time" />
      <p id="nowLabel" class="now-label hidden"></p>
    </div>

    <p id="lead" class="lead" aria-live="polite"></p>

    <div id="cards" class="cards" aria-live="polite"></div>

    <p id="hint" class="hint"></p>
  </main>

  <dialog id="settings" aria-labelledby="settingsTitle">
    <h2 id="settingsTitle">Settings</h2>
    <label>
      Age range
      <select id="age">
        <option value="child">Child (6–13) · 9–11 h</option>
        <option value="teen">Teen (14–17) · 8–10 h</option>
        <option value="adult" selected>Adult (18–64) · 7–9 h</option>
        <option value="senior">Senior (65+) · 7–8 h</option>
      </select>
    </label>
    <label>
      Time to fall asleep (minutes)
      <input id="latency" type="number" min="0" max="120" value="15" />
    </label>
    <button id="settingsClose" type="button">Done</button>
  </dialog>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => { });
    }
  </script>
</body>

</html>
