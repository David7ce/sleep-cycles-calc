<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="Calculate optimal sleep times based on 90-minute cycles" />
  <meta name="theme-color" content="#1d4ed8" />
  <meta name="color-scheme" content="light" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="favicon.ico" />

  <!-- iOS Web App Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sleep Calc" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

  <!-- Android Chrome Meta Tags -->
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Sleep Time Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main>
    <h1>Sleep Time Calculator</h1>
    <p class="intro">Use 90-minute sleep cycles to find better wake-up and bedtime windows.</p>

    <section class="panel" aria-label="Sleep calculator controls">
      <div class="form-grid">
        <div class="field">
          <label for="age">Age range</label>
          <select id="age">
            <option value="child">Child (6-13) → 9-11h</option>
            <option value="teen">Teen (14-17) → 8-10h</option>
            <option value="adult" selected>Adult (18-64) → 7-9h</option>
            <option value="senior">Senior (65+) → 7-8h</option>
          </select>
        </div>
        <div class="field">
          <label for="wakeTime">Wake up time</label>
          <input id="wakeTime" type="time" value="07:00" />
        </div>
        <div class="field">
          <label for="bedTime">Bedtime</label>
          <input id="bedTime" type="time" value="23:00" />
        </div>
        <div class="field">
          <label for="latency">Time to fall asleep</label>
          <input id="latency" type="number" min="0" value="15" />
        </div>
      </div>

      <div class="actions">
        <button id="wakeBtn" type="button">Calculate bedtime</button>
        <button id="bedBtn" type="button" class="secondary">Calculate wake-up time</button>
        <button id="nowBtn" type="button" class="ghost">Sleep now</button>
      </div>

      <section id="result" class="result hidden" aria-live="polite" aria-label="Calculation results">
        <h2 id="resultTitle">Results</h2>
        <p id="sleepSummary"></p>
        <p id="resultLead"></p>
        <div id="cards" class="cards"></div>
        <button id="backBtn" type="button" class="ghost" style="margin-top:0.9rem;">Go back</button>
      </section>
    </section>
  </main>

  <script src="script.js"></script>

  <!-- Register Service Worker for PWA functionality -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then((registration) => {
          console.log('Service Worker registered:', registration);
        })
        .catch((error) => {
          console.warn('Service Worker registration failed:', error);
        });
    }
  </script>
</body>

</html>
