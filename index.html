<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sleep Time Calculator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: #dbe2ea;
      --primary: #1d4ed8;
      --good-bg: #dcfce7;
      --good-text: #14532d;
      --ok-bg: #fef3c7;
      --ok-text: #78350f;
      --low-bg: #fee2e2;
      --low-text: #7f1d1d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      max-width: 56rem;
      margin: 0 auto;
      padding: 1rem;
    }

    h1 {
      font-size: 1.6rem;
      margin: 0;
    }

    .intro {
      color: var(--muted);
      margin: 0.5rem 0 1.25rem;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.04);
    }

    .form-grid {
      display: grid;
      gap: 0.75rem;
    }

    .field {
      display: grid;
      gap: 0.4rem;
    }

    label { font-weight: 600; }

    input[type="time"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 0.55rem;
      padding: 0.65rem 0.75rem;
      font: inherit;
    }

    .actions {
      display: grid;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    button {
      border: 0;
      border-radius: 0.6rem;
      padding: 0.7rem 0.9rem;
      font: inherit;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      cursor: pointer;
    }

    button.secondary {
      background: #334155;
    }

    button.ghost {
      background: #e2e8f0;
      color: #0f172a;
    }

    .result {
      margin-top: 1rem;
    }

    .result p {
      margin: 0.3rem 0;
      color: var(--muted);
    }

    .cards {
      margin-top: 0.85rem;
      display: grid;
      gap: 0.6rem;
    }

    .card {
      border-radius: 0.65rem;
      padding: 0.75rem;
      border: 1px solid transparent;
    }

    .card h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .card p {
      margin: 0.2rem 0 0;
      font-size: 0.95rem;
    }

    .card.good {
      background: var(--good-bg);
      color: var(--good-text);
      border-color: #86efac;
    }

    .card.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
      border-color: #fcd34d;
    }

    .card.low {
      background: var(--low-bg);
      color: var(--low-text);
      border-color: #fca5a5;
    }

    .hidden { display: none; }

    @media (min-width: 40rem) {
      .actions {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Sleep Time Calculator</h1>
    <p class="intro">Use 90-minute sleep cycles to find better wake-up and bedtime windows.</p>

    <section class="panel" aria-label="Sleep calculator controls">
      <div class="form-grid">
        <div class="field">
          <label for="wakeTime">Wake up time</label>
          <input id="wakeTime" type="time" />
        </div>
        <div class="field">
          <label for="bedTime">Bedtime</label>
          <input id="bedTime" type="time" />
        </div>
      </div>

      <div class="actions">
        <button id="wakeBtn" type="button">Calculate bedtime</button>
        <button id="bedBtn" type="button" class="secondary">Calculate wake-up time</button>
        <button id="nowBtn" type="button" class="ghost">Sleep now</button>
      </div>

      <section id="result" class="result hidden" aria-live="polite">
        <h2 id="resultTitle">Results</h2>
        <p>The average human takes <strong>15 minutes</strong> to fall asleep.</p>
        <p id="resultLead"></p>
        <div id="cards" class="cards"></div>
        <button id="backBtn" type="button" class="ghost" style="margin-top:0.9rem;">Go back</button>
      </section>
    </section>
  </main>

  <script>
    const CYCLES = [6, 5, 4, 3, 2, 1];
    const FALL_ASLEEP_MIN = 15;

    const wakeTime = document.getElementById('wakeTime');
    const bedTime = document.getElementById('bedTime');
    const result = document.getElementById('result');
    const resultTitle = document.getElementById('resultTitle');
    const resultLead = document.getElementById('resultLead');
    const cards = document.getElementById('cards');

    function fromTimeInput(value) {
      if (!value) return null;
      const [hour, minute] = value.split(':').map(Number);
      const date = new Date();
      date.setHours(hour, minute, 0, 0);
      return date;
    }

    function plusMinutes(base, minutes) {
      return new Date(base.getTime() + minutes * 60000);
    }

    function formatTime(date) {
      return new Intl.DateTimeFormat(undefined, {
        hour: 'numeric',
        minute: '2-digit'
      }).format(date);
    }

    function cardStyle(cycle) {
      if (cycle >= 5) {
        return { cls: 'good', message: 'Best range (5-6 cycles) for a full night of rest.' };
      }
      if (cycle === 4) {
        return { cls: 'ok', message: 'Acceptable rest, but you may still feel a bit tired.' };
      }
      return { cls: 'low', message: 'Short sleep window. Useful only when needed.' };
    }

    function render(options) {
      cards.innerHTML = '';
      for (const option of options) {
        const style = cardStyle(option.cycle);
        const card = document.createElement('article');
        card.className = `card ${style.cls}`;

        const title = document.createElement('h3');
        title.textContent = option.time;
        const text = document.createElement('p');
        text.textContent = `${option.cycle} cycle${option.cycle > 1 ? 's' : ''} • ${style.message}`;

        card.append(title, text);
        cards.append(card);
      }
      result.classList.remove('hidden');
    }

    function calculateFromWakeup() {
      const selected = fromTimeInput(wakeTime.value);
      if (!selected) {
        resultTitle.textContent = 'Pick a wake-up time first.';
        resultLead.textContent = 'Then we can suggest bedtime options.';
        cards.innerHTML = '';
        result.classList.remove('hidden');
        return;
      }

      const options = CYCLES.map(cycle => {
        const when = plusMinutes(selected, -(FALL_ASLEEP_MIN + cycle * 90));
        return { cycle, time: formatTime(when) };
      });

      resultTitle.textContent = 'If you want to wake up at this time, try going to bed at:';
      resultLead.textContent = 'These times help you wake between 90-minute cycles.';
      render(options);
    }

    function calculateFromBedtime() {
      const selected = fromTimeInput(bedTime.value);
      if (!selected) {
        resultTitle.textContent = 'Pick a bedtime first.';
        resultLead.textContent = 'Then we can suggest wake-up options.';
        cards.innerHTML = '';
        result.classList.remove('hidden');
        return;
      }

      const options = CYCLES.map(cycle => {
        const when = plusMinutes(selected, FALL_ASLEEP_MIN + cycle * 90);
        return { cycle, time: formatTime(when) };
      });

      resultTitle.textContent = 'If you go to bed at this time, try waking up at:';
      resultLead.textContent = 'A good night of sleep is usually 5-6 complete cycles.';
      render(options);
    }

    function calculateSleepNow() {
      const now = new Date();
      const options = CYCLES.map(cycle => {
        const when = plusMinutes(now, FALL_ASLEEP_MIN + cycle * 90);
        return { cycle, time: formatTime(when) };
      });

      resultTitle.textContent = 'If you go to sleep right now, you should try to wake up at:';
      resultLead.textContent = 'If you wake at one of these times, you will rise between 90-minute cycles.';
      render(options);
    }

    document.getElementById('wakeBtn').addEventListener('click', calculateFromWakeup);
    document.getElementById('bedBtn').addEventListener('click', calculateFromBedtime);
    document.getElementById('nowBtn').addEventListener('click', calculateSleepNow);
    document.getElementById('backBtn').addEventListener('click', () => {
      result.classList.add('hidden');
      cards.innerHTML = '';
      wakeTime.focus();
    });
  </script>
</body>
</html>
